name: Deploy PR Preview to Dev Hosting

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch/tag/SHA)
        required: false
        default: development

concurrency:
  group: deploy-dev-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_DEV_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_POST_COMMAND: ${{ secrets.DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout pull request head
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout manual ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout push ref
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_PORT:?DEPLOY_PORT is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PATH:?DEPLOY_DEV_PATH is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"

      - name: Prepare SSH
        run: |
          SSH_DIR="${RUNNER_TEMP}/deploy_ssh"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          if [[ -n "${DEPLOY_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$SSH_DIR/known_hosts"
          else
            ssh-keyscan -T 10 -p "$DEPLOY_PORT" "$DEPLOY_HOST" > "$SSH_DIR/known_hosts" || true
          fi
          touch "$SSH_DIR/known_hosts"
          chmod 644 "$SSH_DIR/known_hosts"
          echo "SSH_KEY_PATH=$SSH_DIR/id_ed25519" >> "$GITHUB_ENV"
          echo "SSH_KNOWN_HOSTS=$SSH_DIR/known_hosts" >> "$GITHUB_ENV"

      - name: Deploy preview snapshot via rsync
        run: |
          ssh -i "$SSH_KEY_PATH" \
            -o IdentitiesOnly=yes \
            -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" \
            -o StrictHostKeyChecking=accept-new \
            -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.tmp/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ${SSH_KEY_PATH} -o IdentitiesOnly=yes -o UserKnownHostsFile=${SSH_KNOWN_HOSTS} -o StrictHostKeyChecking=accept-new -p ${DEPLOY_PORT}" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Optional post-deploy command
        if: ${{ env.DEPLOY_POST_COMMAND != '' }}
        run: |
          ssh -i "$SSH_KEY_PATH" \
            -o IdentitiesOnly=yes \
            -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" \
            -o StrictHostKeyChecking=accept-new \
            -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && $DEPLOY_POST_COMMAND"
