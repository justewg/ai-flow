name: Deploy PR Preview to Dev Hosting

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch/tag/SHA)
        required: false
        default: development

concurrency:
  group: deploy-dev-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, planka-deploy]
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_DEV_PATH }}
      DEPLOY_POST_COMMAND: ${{ secrets.DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout pull request head
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      - name: Checkout manual ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Checkout push ref
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate required settings
        run: |
          : "${DEPLOY_PATH:?DEPLOY_DEV_PATH is required}"

      - name: Deploy preview snapshot locally via rsync
        run: |
          mkdir -p "$DEPLOY_PATH"
          rsync -az --delete \
            --exclude 'actions-runner/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.tmp/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ "$DEPLOY_PATH/"

      - name: Verify deployed flow toolkit snapshot
        run: |
          test -x "$DEPLOY_PATH/.flow/shared/scripts/run.sh"
          test -f "$DEPLOY_PATH/.gitmodules"

      - name: Optional post-deploy command
        if: ${{ env.DEPLOY_POST_COMMAND != '' }}
        run: |
          cd "$DEPLOY_PATH"
          bash -lc "$DEPLOY_POST_COMMAND"
