name: Deploy Main to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_POST_COMMAND: ${{ secrets.DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_PORT:?DEPLOY_PORT is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"

      - name: Prepare SSH
        run: |
          SSH_DIR="${RUNNER_TEMP}/deploy_ssh"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          if [[ -n "${DEPLOY_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$SSH_DIR/known_hosts"
          else
            ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" > "$SSH_DIR/known_hosts"
          fi
          chmod 644 "$SSH_DIR/known_hosts"
          echo "SSH_KEY_PATH=$SSH_DIR/id_ed25519" >> "$GITHUB_ENV"
          echo "SSH_KNOWN_HOSTS=$SSH_DIR/known_hosts" >> "$GITHUB_ENV"

      - name: Deploy snapshot via rsync
        run: |
          ssh -i "$SSH_KEY_PATH" \
            -o IdentitiesOnly=yes \
            -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" \
            -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.tmp/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ${SSH_KEY_PATH} -o IdentitiesOnly=yes -o UserKnownHostsFile=${SSH_KNOWN_HOSTS} -p ${DEPLOY_PORT}" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Optional post-deploy command
        if: ${{ env.DEPLOY_POST_COMMAND != '' }}
        run: |
          ssh -i "$SSH_KEY_PATH" \
            -o IdentitiesOnly=yes \
            -o UserKnownHostsFile="$SSH_KNOWN_HOSTS" \
            -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && $DEPLOY_POST_COMMAND"
