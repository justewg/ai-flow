name: Deploy Main to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      runner_available: ${{ steps.check.outputs.runner_available }}

    steps:
      - name: Check self-hosted runner availability
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          REQUIRED_LABEL: planka-deploy
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status_code="$(
            curl -sSL \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/runners?per_page=100"
          )"

          if [[ "$status_code" == "403" ]]; then
            echo "::warning title=Runner preflight skipped::GITHUB_TOKEN cannot read repository runners API on this repo. Skipping fail-fast runner check and continuing to the self-hosted job."
            echo "runner_available=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$status_code" != "200" ]]; then
            echo "::error title=Runner preflight failed::GitHub API returned HTTP $status_code while checking self-hosted runners."
            cat "$response_file"
            exit 1
          fi

          response="$(cat "$response_file")"

          matching="$(
            echo "$response" | jq -c --arg label "$REQUIRED_LABEL" '
              [
                .runners[]
                | select(.status == "online")
                | select(any((.labels // []); .name == $label))
              ]
            '
          )"
          count="$(echo "$matching" | jq 'length')"

          echo "Online runners with label '$REQUIRED_LABEL': $count"
          echo "$matching" | jq '[.[] | {name, status, busy, labels: [.labels[].name]}]'

          if [[ "$count" -gt 0 ]]; then
            echo "runner_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "runner_available=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    if: ${{ needs.preflight.outputs.runner_available != 'false' }}
    runs-on: [self-hosted, planka-deploy]
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_POST_COMMAND: ${{ secrets.DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate required settings
        run: |
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"

      - name: Deploy snapshot locally via rsync
        run: |
          mkdir -p "$DEPLOY_PATH"
          rsync -az --delete \
            --exclude 'actions-runner/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.tmp/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ "$DEPLOY_PATH/"

      - name: Verify deployed flow toolkit snapshot
        run: |
          test -x "$DEPLOY_PATH/.flow/shared/scripts/run.sh"
          test -f "$DEPLOY_PATH/.gitmodules"

      - name: Optional post-deploy command
        if: ${{ env.DEPLOY_POST_COMMAND != '' }}
        run: |
          cd "$DEPLOY_PATH"
          bash -lc "$DEPLOY_POST_COMMAND"

  fail-missing-runner:
    needs: preflight
    if: ${{ needs.preflight.outputs.runner_available == 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain missing self-hosted runner
        run: |
          echo "::error title=Self-hosted runner unavailable::No online runner with label 'planka-deploy' is registered for $GITHUB_REPOSITORY. Register or start the runner from docs/self-hosted-runner-deploy.md and rerun this workflow."
          exit 1
