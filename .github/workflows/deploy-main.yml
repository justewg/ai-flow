name: Deploy Main to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, planka-deploy]
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_POST_COMMAND: ${{ secrets.DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required settings
        run: |
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"

      - name: Deploy snapshot locally via rsync
        run: |
          mkdir -p "$DEPLOY_PATH"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.tmp/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ "$DEPLOY_PATH/"

      - name: Optional post-deploy command
        if: ${{ env.DEPLOY_POST_COMMAND != '' }}
        run: |
          cd "$DEPLOY_PATH"
          bash -lc "$DEPLOY_POST_COMMAND"
