name: Notify Telegram on Post-Merge Workflow Status

on:
  workflow_run:
    types:
      - completed
    workflows:
      - Deploy Main to Hosting
      - Project Auto Close Tasks

jobs:
  notify_telegram:
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      WF_NAME: ${{ github.event.workflow_run.name }}
      WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      WF_URL: ${{ github.event.workflow_run.html_url }}
      WF_EVENT: ${{ github.event.workflow_run.event }}
      WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
      WF_SHA: ${{ github.event.workflow_run.head_sha }}
      WF_ACTOR: ${{ github.event.workflow_run.actor.login }}

    steps:
      - name: Validate required secrets
        run: |
          : "${TG_BOT_TOKEN:?TG_BOT_TOKEN is required}"
          : "${TG_CHAT_ID:?TG_CHAT_ID is required}"

      - name: Extract linked PRs
        id: extract
        run: |
          PR_NUMBERS="$(jq -r '.workflow_run.pull_requests[]?.number' "$GITHUB_EVENT_PATH" | xargs || true)"
          if [[ -z "${PR_NUMBERS}" ]]; then
            PR_NUMBERS="none"
          fi
          echo "pr_numbers=${PR_NUMBERS}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${WF_SHA:0:8}" >> "${GITHUB_OUTPUT}"

      - name: Send Telegram push
        env:
          PR_NUMBERS: ${{ steps.extract.outputs.pr_numbers }}
          SHORT_SHA: ${{ steps.extract.outputs.short_sha }}
          REPO: ${{ github.repository }}
        run: |
          STATUS_LINE="SUCCESS"
          if [[ "${WF_CONCLUSION}" != "success" ]]; then
            STATUS_LINE="FAIL: ${WF_CONCLUSION}"
          fi

          MESSAGE=$'PLANKA: post-merge workflow\n'
          MESSAGE+="Workflow: ${WF_NAME}"$'\n'
          MESSAGE+="Status: ${STATUS_LINE}"$'\n'
          MESSAGE+="Repo: ${REPO}"$'\n'
          MESSAGE+="Branch: ${WF_BRANCH}"$'\n'
          MESSAGE+="SHA: ${SHORT_SHA}"$'\n'
          MESSAGE+="Linked PRs: ${PR_NUMBERS}"$'\n'
          MESSAGE+="Event: ${WF_EVENT}"$'\n'
          MESSAGE+="Actor: @${WF_ACTOR}"$'\n'
          MESSAGE+="Run: ${WF_URL}"

          payload="$(
            jq -n \
              --arg chat_id "${TG_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}'
          )"

          curl -fsS \
            -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "${payload}" >/dev/null
