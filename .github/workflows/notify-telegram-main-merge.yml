name: Notify Telegram on Post-Merge Workflow Status

on:
  workflow_run:
    types:
      - completed
    workflows:
      - Deploy Main to Hosting
      - Deploy PR Preview to Dev Hosting
      - Project Auto Close Tasks
      - Publish Flow Web Docs

jobs:
  notify_telegram:
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      WF_NAME: ${{ github.event.workflow_run.name }}
      WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      WF_URL: ${{ github.event.workflow_run.html_url }}
      WF_EVENT: ${{ github.event.workflow_run.event }}
      WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
      WF_SHA: ${{ github.event.workflow_run.head_sha }}
      WF_ACTOR: ${{ github.event.workflow_run.actor.login }}
      WF_REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}

    steps:
      - name: Validate required secrets
        run: |
          : "${TG_BOT_TOKEN:?TG_BOT_TOKEN is required}"
          : "${TG_CHAT_ID:?TG_CHAT_ID is required}"

      - name: Extract linked PRs
        id: extract
        run: |
          PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0]?.number // ""' "$GITHUB_EVENT_PATH")"
          PR_URL="$(jq -r '.workflow_run.pull_requests[0]?.html_url // ""' "$GITHUB_EVENT_PATH")"
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${WF_SHA:0:8}" >> "${GITHUB_OUTPUT}"

      - name: Send Telegram push
        env:
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          PR_URL: ${{ steps.extract.outputs.pr_url }}
          SHORT_SHA: ${{ steps.extract.outputs.short_sha }}
        run: |
          html_escape() {
            jq -rn --arg v "${1:-}" '$v|@html'
          }

          if [[ "${WF_NAME}" == "Deploy PR Preview to Dev Hosting" && "${WF_EVENT}" == "push" && "${WF_BRANCH}" == "development" ]]; then
            echo "Skip Telegram notify for development push deploy preview"
            exit 0
          fi

          CHECK_ICON="💤"
          HEADER_STATUS_ICON="✅"
          if [[ "${WF_CONCLUSION}" != "success" ]]; then
            CHECK_ICON="🚨"
            HEADER_STATUS_ICON="❌"
          fi

          NOW_UTC="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          MESSAGE="<b>${CHECK_ICON} ${HEADER_STATUS_ICON} $(html_escape "${WF_NAME}")</b>"$'\n'
          MESSAGE+="📦 <code>$(html_escape "${WF_REPOSITORY}")</code>"$'\n'
          if [[ -n "${PR_NUMBER}" && -n "${PR_URL}" ]]; then
            MESSAGE+="🔗 <a href=\"$(html_escape "${PR_URL}")\">𝐏𝐑#${PR_NUMBER}</a>"$'\n'
          fi
          MESSAGE+="🧾 <a href=\"$(html_escape "${WF_URL}")\">Run log</a>"$'\n'

          AUX=$'CONCLUSION='"${WF_CONCLUSION}"$'\n'
          AUX+=$'BRANCH='"${WF_BRANCH}"$'\n'
          AUX+=$'SHA='"${SHORT_SHA}"$'\n'
          AUX+=$'EVENT='"${WF_EVENT}"$'\n'
          AUX+=$'ACTOR='"${WF_ACTOR}"$'\n'
          AUX+=$'TIME_UTC='"${NOW_UTC}"
          MESSAGE+="<blockquote><code>$(html_escape "${AUX}")</code></blockquote>"

          payload="$(
            jq -n \
              --arg chat_id "${TG_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}'
          )"

          curl -fsS \
            -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "${payload}" >/dev/null
