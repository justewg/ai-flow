name: Notify Telegram on PR Review Events

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
    branches:
      - main

jobs:
  notify_telegram:
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      PR_ACTION: ${{ github.event.action }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      PR_COMMITS: ${{ github.event.pull_request.commits }}
      PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
      PR_DRAFT: ${{ github.event.pull_request.draft }}

    steps:
      - name: Validate required secrets
        run: |
          : "${TG_BOT_TOKEN:?TG_BOT_TOKEN is required}"
          : "${TG_CHAT_ID:?TG_CHAT_ID is required}"

      - name: Extract task IDs
        id: extract
        run: |
          TASK_IDS="$(printf '%s\n%s\n' "${PR_TITLE}" "${PR_BODY}" | grep -Eo 'PL-[0-9]{3}' | sort -u | xargs || true)"
          if [[ -z "${TASK_IDS}" ]]; then
            TASK_IDS="none"
          fi
          echo "task_ids=${TASK_IDS}" >> "${GITHUB_OUTPUT}"

      - name: Send Telegram push
        env:
          TASK_IDS: ${{ steps.extract.outputs.task_ids }}
        run: |
          ACTION_LABEL="${PR_ACTION}"
          SIGNAL_LABEL="TEMP_PROGRESS"
          STAGE_LABEL="Временная дельта"
          CHECK_NOW="NO"
          case "${PR_ACTION}" in
            opened) ACTION_LABEL="opened" ;;
            reopened) ACTION_LABEL="reopened" ;;
            synchronize) ACTION_LABEL="updated" ;;
            ready_for_review)
              ACTION_LABEL="ready_for_review"
              SIGNAL_LABEL="FINAL_REVIEW"
              STAGE_LABEL="In Review (финал)"
              CHECK_NOW="YES"
              ;;
            edited) ACTION_LABEL="edited" ;;
          esac

          if [[ "${PR_DRAFT}" == "true" && "${PR_ACTION}" != "ready_for_review" ]]; then
            STAGE_LABEL="Draft (временная дельта)"
          fi

          MESSAGE=$'PLANKA: PR review signal\n'
          MESSAGE+="Signal: ${SIGNAL_LABEL}"$'\n'
          MESSAGE+="Action: ${ACTION_LABEL}"$'\n'
          MESSAGE+="Stage: ${STAGE_LABEL}"$'\n'
          MESSAGE+="Check now: ${CHECK_NOW}"$'\n'
          MESSAGE+="PR #${PR_NUMBER}: ${PR_TITLE}"$'\n'
          MESSAGE+="Tasks: ${TASK_IDS}"$'\n'
          MESSAGE+="From ${PR_HEAD} -> ${PR_BASE}"$'\n'
          MESSAGE+="Author: @${PR_AUTHOR}"$'\n'
          MESSAGE+="Commits: ${PR_COMMITS}, files: ${PR_CHANGED_FILES}"$'\n'
          MESSAGE+="PR: ${PR_URL}"

          payload="$(
            jq -n \
              --arg chat_id "${TG_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}'
          )"

          curl -fsS \
            -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "${payload}" >/dev/null
