name: Project Auto Close Tasks

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  close_project_tasks:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: [self-hosted, planka-deploy]
    env:
      GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PROJECT_OWNER: justewg
      PROJECT_NUMBER: 2

    steps:
      - name: Validate token
        run: |
          : "${GH_TOKEN:?PROJECT_AUTOMATION_TOKEN is required}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract task ids from PR title/body
        id: extract
        run: |
          PRIMARY_TASK_ID="$(
            printf '%s\n' "${PR_TITLE}" \
              | grep -Eo 'PL-[0-9]{3}|ISSUE-[0-9]+' \
              | head -n1 || true
          )"
          EXPLICIT_TASK_IDS="$(
            {
              printf '%s\n' "${PR_BODY}" | sed -nE 's/^CODEX_TASK:[[:space:]]*(PL-[0-9]{3}|ISSUE-[0-9]+).*$/\1/p'
              printf '%s\n' "${PR_BODY}" | sed -nE 's/^- Task ID:[[:space:]]*(PL-[0-9]{3}|ISSUE-[0-9]+).*$/\1/p'
              printf '%s\n' "${PR_BODY}" | sed -nE 's/^Task ID:[[:space:]]*(PL-[0-9]{3}|ISSUE-[0-9]+).*$/\1/p'
              printf '%s\n' "${PR_BODY}" | sed -nE 's/^(Fixes|Closes|Resolves)[[:space:]]+(PL-[0-9]{3}|ISSUE-[0-9]+).*$/\2/pI'
              printf '%s\n' "${PR_BODY}" | sed -nE 's/^(Fixes|Closes|Resolves)[[:space:]]+#([0-9]+).*$/ISSUE-\2/pI'
            } | sed '/^$/d' | sort -u
          )"
          TASK_IDS="$(
            {
              printf '%s\n' "${PRIMARY_TASK_ID}"
              printf '%s\n' "${EXPLICIT_TASK_IDS}"
            } | sed '/^$/d' | sort -u
          )"
          if [[ -z "${TASK_IDS}" ]]; then
            echo "has_tasks=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "has_tasks=true"
            echo "task_ids<<EOF"
            printf '%s\n' "${TASK_IDS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Update project statuses to Done
        if: ${{ steps.extract.outputs.has_tasks == 'true' }}
        run: |
          failed=0
          while IFS= read -r task_id; do
            [[ -z "${task_id}" ]] && continue
            echo "Updating ${task_id} -> Done"
            if ! bash scripts/ci/project_set_status.sh "${task_id}" "Done" "Done"; then
              echo "::error::Failed to update ${task_id} in project"
              failed=1
            fi
          done <<'EOF'
          ${{ steps.extract.outputs.task_ids }}
          EOF
          exit "${failed}"
