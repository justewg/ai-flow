name: Publish Flow Web Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-flow-docs
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  build_bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Build and validate flow docs bundle
        run: |
          bash scripts/flow_docs/publish_flow_docs.sh \
            --output-dir dist/flow-docs \
            --bundle-file dist/flow-web-docs-bundle.tgz

      - name: Upload flow docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow-web-docs-bundle
          if-no-files-found: error
          path: |
            dist/flow-docs
            dist/flow-web-docs-bundle.tgz

  preflight_deploy_runner:
    if: ${{ vars.FLOW_DOCS_DEPLOY_PATH != '' }}
    runs-on: ubuntu-latest
    outputs:
      runner_available: ${{ steps.check.outputs.runner_available }}

    steps:
      - name: Check self-hosted runner availability
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          REQUIRED_LABEL: planka-deploy
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status_code="$(
            curl -sSL \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/runners?per_page=100"
          )"

          if [[ "$status_code" == "403" ]]; then
            echo "::warning title=Runner preflight skipped::GITHUB_TOKEN cannot read repository runners API on this repo. Skipping fail-fast runner check and continuing to the self-hosted job."
            echo "runner_available=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$status_code" != "200" ]]; then
            echo "::error title=Runner preflight failed::GitHub API returned HTTP $status_code while checking self-hosted runners."
            cat "$response_file"
            exit 1
          fi

          response="$(cat "$response_file")"
          matching="$(
            echo "$response" | jq -c --arg label "$REQUIRED_LABEL" '
              [
                .runners[]
                | select(.status == "online")
                | select(any((.labels // [])[]; .name == $label))
              ]
            '
          )"
          count="$(echo "$matching" | jq 'length')"

          echo "Online runners with label '$REQUIRED_LABEL': $count"
          echo "$matching" | jq '[.[] | {name, status, busy, labels: [.labels[].name]}]'

          if [[ "$count" -gt 0 ]]; then
            echo "runner_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "runner_available=false" >> "$GITHUB_OUTPUT"
          fi

  deploy_nginx:
    needs:
      - build_bundle
      - preflight_deploy_runner
    if: ${{ vars.FLOW_DOCS_DEPLOY_PATH != '' && needs.preflight_deploy_runner.outputs.runner_available != 'false' }}
    runs-on: [self-hosted, planka-deploy]
    env:
      FLOW_DOCS_DEPLOY_PATH: ${{ vars.FLOW_DOCS_DEPLOY_PATH }}
      FLOW_DOCS_DEPLOY_POST_COMMAND: ${{ vars.FLOW_DOCS_DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download flow docs artifact
        uses: actions/download-artifact@v4
        with:
          name: flow-web-docs-bundle
          path: dist

      - name: Validate required settings
        run: |
          : "${FLOW_DOCS_DEPLOY_PATH:?FLOW_DOCS_DEPLOY_PATH repository variable is required}"
          test -f dist/flow-docs/redocly.yaml

      - name: Deploy flow docs bundle to hosting path
        run: |
          bash scripts/flow_docs/deploy_flow_docs.sh \
            --site-dir dist/flow-docs \
            --deploy-root "${FLOW_DOCS_DEPLOY_PATH}" \
            --release-id "${GITHUB_SHA}"

      - name: Optional post-deploy command
        if: ${{ env.FLOW_DOCS_DEPLOY_POST_COMMAND != '' }}
        run: |
          bash -lc "$FLOW_DOCS_DEPLOY_POST_COMMAND"

  fail_missing_deploy_runner:
    needs: preflight_deploy_runner
    if: ${{ vars.FLOW_DOCS_DEPLOY_PATH != '' && needs.preflight_deploy_runner.outputs.runner_available == 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain missing self-hosted runner
        run: |
          echo "::error title=Self-hosted runner unavailable::No online runner with label 'planka-deploy' is registered for $GITHUB_REPOSITORY. Register or start the runner from docs/self-hosted-runner-deploy.md and rerun this workflow."
          exit 1

  publish_redocly:
    needs: build_bundle
    runs-on: ubuntu-latest
    env:
      REDOCLY_AUTHORIZATION: ${{ secrets.REDOCLY_AUTHORIZATION }}
      REDOCLY_ORGANIZATION: ${{ secrets.REDOCLY_ORGANIZATION }}
      REDOCLY_PROJECT: ${{ secrets.REDOCLY_PROJECT }}
      REDOCLY_MOUNT_PATH: ${{ secrets.REDOCLY_MOUNT_PATH }}

    steps:
      - name: Check Readocly publish secrets
        id: publish_gate
        run: |
          if [[ -z "${REDOCLY_AUTHORIZATION}" || -z "${REDOCLY_ORGANIZATION}" || -z "${REDOCLY_PROJECT}" ]]; then
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            echo "Readocly publish skipped: required REDOCLY_* secrets are missing."
            exit 0
          fi

          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Download flow docs artifact
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: flow-web-docs-bundle
          path: dist

      - name: Publish flow docs to Readocly
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        run: |
          bash scripts/flow_docs/publish_flow_docs.sh \
            --skip-build \
            --output-dir dist/flow-docs \
            --bundle-file dist/flow-web-docs-bundle.tgz \
            --publish
