name: Publish Flow Web Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-flow-docs
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_bundle:
    runs-on: [self-hosted, planka-deploy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Build and validate flow docs bundle
        run: |
          bash scripts/flow_docs/publish_flow_docs.sh \
            --output-dir dist/flow-docs \
            --static-output-dir dist/flow-docs-static \
            --scalar-output-dir dist/flow-docs-scalar \
            --bundle-file dist/flow-web-docs-bundle.tgz

      - name: Upload flow docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow-web-docs-bundle
          if-no-files-found: error
          path: |
            dist/flow-docs
            dist/flow-docs-static
            dist/flow-docs-scalar
            dist/flow-web-docs-bundle.tgz

  deploy_nginx:
    needs: build_bundle
    if: ${{ vars.FLOW_DOCS_DEPLOY_PATH != '' }}
    runs-on: [self-hosted, planka-deploy]
    env:
      FLOW_DOCS_DEPLOY_PATH: ${{ vars.FLOW_DOCS_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download flow docs artifact
        uses: actions/download-artifact@v4
        with:
          name: flow-web-docs-bundle
          path: dist

      - name: Validate required settings
        run: |
          : "${FLOW_DOCS_DEPLOY_PATH:?FLOW_DOCS_DEPLOY_PATH repository variable is required}"
          test -f dist/flow-docs-static/index.html

      - name: Deploy flow docs static site to hosting path
        run: |
          bash scripts/flow_docs/deploy_flow_docs.sh \
            --site-dir dist/flow-docs-static \
            --deploy-root "${FLOW_DOCS_DEPLOY_PATH}" \
            --release-id "${GITHUB_SHA}"

  deploy_scalar_reference:
    needs: build_bundle
    if: ${{ vars.FLOW_DOCS_SCALAR_DEPLOY_PATH != '' }}
    runs-on: [self-hosted, planka-deploy]
    env:
      FLOW_DOCS_SCALAR_DEPLOY_PATH: ${{ vars.FLOW_DOCS_SCALAR_DEPLOY_PATH }}
      FLOW_DOCS_SCALAR_DEPLOY_POST_COMMAND: ${{ vars.FLOW_DOCS_SCALAR_DEPLOY_POST_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download flow docs artifact
        uses: actions/download-artifact@v4
        with:
          name: flow-web-docs-bundle
          path: dist

      - name: Validate Scalar deploy inputs
        run: |
          : "${FLOW_DOCS_SCALAR_DEPLOY_PATH:?FLOW_DOCS_SCALAR_DEPLOY_PATH repository variable is required}"
          test -f dist/flow-docs-scalar/index.html
          test -f dist/flow-docs-scalar/openapi.json
          test -f dist/flow-docs-scalar/server.mjs

      - name: Deploy Scalar API Reference site to hosting path
        run: |
          bash scripts/flow_docs/deploy_flow_docs.sh \
            --site-dir dist/flow-docs-scalar \
            --deploy-root "${FLOW_DOCS_SCALAR_DEPLOY_PATH}" \
            --release-id "${GITHUB_SHA}"

      - name: Run Scalar post-deploy command
        if: ${{ env.FLOW_DOCS_SCALAR_DEPLOY_POST_COMMAND != '' }}
        run: |
          bash -lc "${FLOW_DOCS_SCALAR_DEPLOY_POST_COMMAND}"
  publish_redocly:
    needs: build_bundle
    runs-on: [self-hosted, planka-deploy]
    env:
      REDOCLY_AUTHORIZATION: ${{ secrets.REDOCLY_AUTHORIZATION }}
      REDOCLY_ORGANIZATION: ${{ secrets.REDOCLY_ORGANIZATION }}
      REDOCLY_PROJECT: ${{ secrets.REDOCLY_PROJECT }}
      REDOCLY_MOUNT_PATH: ${{ secrets.REDOCLY_MOUNT_PATH }}

    steps:
      - name: Check Readocly publish secrets
        id: publish_gate
        run: |
          if [[ -z "${REDOCLY_AUTHORIZATION}" || -z "${REDOCLY_ORGANIZATION}" || -z "${REDOCLY_PROJECT}" ]]; then
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            echo "Readocly publish skipped: required REDOCLY_* secrets are missing."
            exit 0
          fi

          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Download flow docs artifact
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: flow-web-docs-bundle
          path: dist

      - name: Publish flow docs to Readocly
        if: ${{ steps.publish_gate.outputs.should_publish == 'true' }}
        run: |
          bash scripts/flow_docs/publish_flow_docs.sh \
            --skip-build \
            --output-dir dist/flow-docs \
            --bundle-file dist/flow-web-docs-bundle.tgz \
            --publish
