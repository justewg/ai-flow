<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PLANKA Quick Test</title>
  <style>
    :root{
      --bg:#11161d;
      --panel:#18202a;
      --panel-2:#202a36;
      --key:#36414f;
      --key-border:#566273;
      --text:#f2f5f8;
      --muted:#8fa0b3;
      --gap:8px;
      --radius:14px;
    }
    * { box-sizing: border-box; user-select:none; -webkit-user-select:none; }
    html,body{
      margin:0; padding:0; width:100%; height:100%;
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      overflow:hidden;
    }
    body{ padding:8px; }
    .app{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows: 1fr 0.95fr;
      gap:10px;
    }
    .screen{
      position:relative;
      background:linear-gradient(180deg,#151c25,#11161d);
      border:1px solid #44505e;
      border-radius:18px;
      overflow:hidden;
    }
    .topbar{
      position:absolute; inset:8px 8px auto 8px;
      display:flex; justify-content:flex-end; gap:8px;
      z-index:3;
    }
    .chip{
      min-width:52px;
      height:40px;
      border-radius:12px;
      border:1px solid #586577;
      background:#1a2330;
      color:var(--text);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:700;
    }
    .text{
      position:absolute; inset:18px 18px 18px 18px;
      padding-top:34px;
      font-size: clamp(32px, 5vw, 74px);
      line-height: 1.04;
      font-weight:700;
      letter-spacing:0.5px;
      word-break: break-word;
      white-space: pre-wrap;
      overflow:hidden;
    }
    .keyboard{
      display:grid;
      grid-template-rows: repeat(5, 1fr);
      gap:var(--gap);
      min-height:0;
    }
    .row{
      display:grid;
      gap:var(--gap);
    }
    .key{
      border-radius:var(--radius);
      border:1px solid var(--key-border);
      background:var(--key);
      color:var(--text);
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
      min-height:0;
      font-size: clamp(16px, 2.2vw, 30px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .key:active{ transform:translateY(1px); filter:brightness(1.07); }
    .muted{ color:var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="topbar">
        <button class="chip" id="clearBtn" title="Очистить">⌫</button>
        <button class="chip" id="langBtn" title="Язык">RU</button>
        <button class="chip" id="exitBtn" title="Выход">×</button>
      </div>
      <div class="text" id="text"></div>
    </div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <script>
    const ROWS = [
      ["1","2","3","4","5","6","7","8","9","0"],
      ["Й","Ц","У","К","Е","Н","Г","Ш","Щ","З","Х","Ъ"],
      ["Ф","Ы","В","А","П","Р","О","Л","Д","Ж","Э"],
      ["Я","Ч","С","М","И","Т","Ь","Б","Ю","↵"],
      ["ПРОБЕЛ","←"]
    ];

    const textEl = document.getElementById("text");
    const keyboardEl = document.getElementById("keyboard");
    const clearBtn = document.getElementById("clearBtn");
    const exitBtn = document.getElementById("exitBtn");
    let text = "";

    function renderText() {
      textEl.textContent = text || " ";
    }

    function addKey(value){
      if(value === "←"){ text = text.slice(0,-1); renderText(); return; }
      if(value === "↵"){ text += "\n"; renderText(); return; }
      if(value === "ПРОБЕЛ"){ text += " "; renderText(); return; }
      text += value;
      renderText();
    }

    function buildKeyboard(){
      ROWS.forEach((row, rowIndex) => {
        const rowEl = document.createElement("div");
        rowEl.className = "row";
        if(rowIndex === 0){
          rowEl.style.gridTemplateColumns = "repeat(10, 1fr)";
        } else if(rowIndex === 1){
          rowEl.style.gridTemplateColumns = "repeat(12, 1fr)";
        } else if(rowIndex === 2){
          rowEl.style.gridTemplateColumns = "repeat(11, 1fr)";
        } else if(rowIndex === 3){
          rowEl.style.gridTemplateColumns = "repeat(10, 1fr)";
        } else {
          rowEl.style.gridTemplateColumns = "2fr 1fr";
        }

        row.forEach(label => {
          const btn = document.createElement("button");
          btn.className = "key";
          btn.textContent = label;
          btn.onclick = () => addKey(label);
          rowEl.appendChild(btn);
        });
        keyboardEl.appendChild(rowEl);
      });
    }

    clearBtn.onclick = () => { text = ""; renderText(); };
    exitBtn.onclick = () => {
      if (window.AndroidApp && AndroidApp.exitApp) AndroidApp.exitApp();
    };

    window.__plankaBack = () => true;

    buildKeyboard();
    renderText();
  </script>
</body>
</html>
