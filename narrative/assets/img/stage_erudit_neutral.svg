<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Нейтральный визуал этапа эрудит</title>
  <desc id="desc">Абстрактное поле с регулярной сеткой и спокойными маркерами.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf2f8" />
      <stop offset="100%" stop-color="#d7e1ec" />
    </linearGradient>
    <pattern id="grid" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="#f8fbff" />
      <rect width="90" height="90" fill="none" stroke="#c1cedc" stroke-width="3" />
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)" />
  <rect x="130" y="90" width="1340" height="820" rx="38" fill="#e5edf6" stroke="#b6c4d3" stroke-width="10" />
  <rect x="200" y="160" width="1200" height="680" rx="28" fill="url(#grid)" />
  <rect x="250" y="210" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.85" />
  <rect x="430" y="300" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.7" />
  <rect x="610" y="390" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.85" />
  <rect x="790" y="480" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.7" />
  <rect x="970" y="570" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.85" />
  <rect x="1150" y="660" width="80" height="80" rx="18" fill="#8aa0b4" opacity="0.7" />
</svg>
