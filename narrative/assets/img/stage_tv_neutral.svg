  <rect x="190" y="290" width="280" height="210" rx="24" fill="#d5e1ed" />
  <rect x="500" y="290" width="280" height="210" rx="24" fill="#c9d7e6" />
  <rect x="810" y="290" width="280" height="210" rx="24" fill="#d5e1ed" />
  <rect x="1120" y="290" width="290" height="210" rx="24" fill="#c9d7e6" />
  <rect x="190" y="540" width="590" height="280" rx="30" fill="#e3ecf5" />
  <rect x="810" y="540" width="600" height="280" rx="30" fill="#dce7f2" />
</svg>
