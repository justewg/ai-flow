<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Нейтральный визуал этапа телевизор и поиск</title>
  <desc id="desc">Абстрактный экранный интерфейс с карточками и строкой поиска без текстовых меток.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f8" />
      <stop offset="100%" stop-color="#d9e3ee" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a8bdcf" />
      <stop offset="100%" stop-color="#889fb4" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)" />
  <rect x="110" y="100" width="1380" height="800" rx="42" fill="#f8fbff" stroke="#b7c5d4" stroke-width="10" />
  <rect x="190" y="180" width="1220" height="72" rx="20" fill="url(#bar)" />
  <circle cx="250" cy="216" r="13" fill="#f8fbff" opacity="0.9" />
