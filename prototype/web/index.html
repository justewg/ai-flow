<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PLANKA Prototype - PL-003</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="orientation-warning" class="portrait-warning" role="status" aria-live="polite">
      <div class="rotate-glyph" aria-hidden="true">
        <svg
          class="rotate-icon"
          viewBox="0 0 214.367 214.367"
          preserveAspectRatio="xMidYMid meet"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Поверни экран"
        >
          <path
            fill="currentColor"
            d="M202.403 95.22c0 46.312-33.237 85.002-77.109 93.484v25.663l-69.76-40 69.76-40v23.494c27.176-7.87 47.109-32.964 47.109-62.642 0-35.962-29.258-65.22-65.22-65.22s-65.22 29.258-65.22 65.22c0 9.686 2.068 19.001 6.148 27.688l-27.154 12.754c-5.968-12.707-8.994-26.313-8.994-40.441C11.964 42.716 54.68 0 107.184 0s95.219 42.716 95.219 95.22z"
          />
        </svg>
      </div>
    </div>

    <main class="app">
      <header class="shell-bar">
        <strong class="brand">PLANKA Prototype</strong>
        <div class="shell-controls">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить тему">
            <span id="theme-icon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="split-layout">
        <section class="display-zone">
          <header class="display-toolbar">
            <button id="lang-toggle" class="toolbar-btn" type="button">RU</button>
            <button id="clear-btn" class="toolbar-btn danger" type="button">Очистить</button>
          </header>
          <div id="display-text" class="display-text" aria-live="polite"></div>
        </section>

        <section class="keyboard-zone">
          <div id="keyboard" class="keyboard"></div>
        </section>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
