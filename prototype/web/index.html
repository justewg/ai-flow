<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PLANKA Prototype - PL-003</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="orientation-warning" class="portrait-warning" role="status" aria-live="polite">
      <div class="rotate-glyph" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker
              id="rotate-arrow-head"
              markerWidth="6"
              markerHeight="6"
              refX="3"
              refY="3"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M0 0L0 6L6 3Z" fill="currentColor" />
            </marker>
          </defs>
          <path
            d="M90 60a30 30 0 1 1-24-29"
            fill="none"
            stroke="currentColor"
            stroke-width="10"
            stroke-linecap="round"
            marker-end="url(#rotate-arrow-head)"
          />
        </svg>
      </div>
    </div>

    <main class="app">
      <header class="shell-bar">
        <strong class="brand">PLANKA Prototype</strong>
        <div class="shell-controls">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить тему">
            <span id="theme-icon" aria-hidden="true">☾</span>
          </button>
          <span id="orientation-state" class="state-pill">landscape lock: pending</span>
        </div>
      </header>

      <div class="split-layout">
        <section class="display-zone">
          <header class="display-toolbar">
            <button id="lang-toggle" class="toolbar-btn" type="button">RU</button>
            <button id="clear-btn" class="toolbar-btn danger" type="button">Очистить</button>
          </header>
          <div id="display-text" class="display-text" aria-live="polite"></div>
        </section>

        <section class="keyboard-zone">
          <div id="keyboard" class="keyboard"></div>
        </section>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
