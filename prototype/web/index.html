<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PLANKA" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>PLANKA Prototype - PL-003</title />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="orientation-warning" class="portrait-warning" role="status" aria-live="polite">
      <div class="rotate-glyph" aria-hidden="true">
        <svg
          class="rotate-icon"
          viewBox="0 0 214.367 214.367"
          preserveAspectRatio="xMidYMid meet"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Поверни экран"
        >
          <path
            fill="currentColor"
            d="M202.403 95.22c0 46.312-33.237 85.002-77.109 93.484v25.663l-69.76-40 69.76-40v23.494c27.176-7.87 47.109-32.964 47.109-62.642 0-35.962-29.258-65.22-65.22-65.22s-65.22 29.258-65.22 65.22c0 9.686 2.068 19.001 6.148 27.688l-27.154 12.754c-5.968-12.707-8.994-26.313-8.994-40.441C11.964 42.716 54.68 0 107.184 0s95.219 42.716 95.219 95.22z"
          />
        </svg>
      </div>
    </div>

    
    <main class="app">
      <header class="shell-bar">
        <div class="shell-controls">
          <button id="clear-btn" class="shell-btn shell-btn-danger" type="button" aria-label="Очистить текст">
            ×
          </button>
          <button id="lang-toggle" class="shell-btn shell-btn-lang" type="button" aria-label="Переключить язык">
            RU
          </button>
          <div id="parent-trigger-dev-controls" class="dev-volume-controls" hidden>
            <button
              id="parent-volume-up-dev"
              class="shell-btn shell-btn-volume"
              type="button"
              aria-label="Эмуляция громкости вверх"
            >
              VOL+
            </button>
            <button
              id="parent-volume-down-dev"
              class="shell-btn shell-btn-volume"
              type="button"
              aria-label="Эмуляция громкости вниз"
            >
              VOL-
            </button>
          </div>
          <button id="theme-toggle" class="shell-btn" type="button" aria-label="Переключить тему">
            <span id="theme-icon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="split-layout">
        <section class="display-zone">
          <div id="display-text" class="display-text" aria-live="polite"></div>
        </section>

        <section class="keyboard-zone">
          <div id="keyboard" class="keyboard"></div>
        </section>
      </div>
    </main>

    <div id="parent-pin-overlay" class="parent-overlay" hidden>
      <section class="parent-card" role="dialog" aria-modal="true" aria-labelledby="parent-pin-title">
        <h2 id="parent-pin-title" class="parent-title">Родительский контроль</h2>
        <div id="parent-pin-dots" class="pin-dots" aria-live="polite" aria-label="Ввод PIN"></div>
        <p id="parent-pin-error" class="parent-error" aria-live="polite"></p>

        <div class="pin-pad">
          <button class="pin-key" type="button" data-pin-digit="1">1</button>
          <button class="pin-key" type="button" data-pin-digit="2">2</button>
          <button class="pin-key" type="button" data-pin-digit="3">3</button>
          <button class="pin-key" type="button" data-pin-digit="4">4</button>
          <button class="pin-key" type="button" data-pin-digit="5">5</button>
          <button class="pin-key" type="button" data-pin-digit="6">6</button>
          <button class="pin-key" type="button" data-pin-digit="7">7</button>
          <button class="pin-key" type="button" data-pin-digit="8">8</button>
          <button class="pin-key" type="button" data-pin-digit="9">9</button>
          <button class="pin-key pin-key-wide" type="button" data-pin-action="backspace">⌫</button>
          <button class="pin-key" type="button" data-pin-digit="0">0</button>
          <button class="pin-key pin-key-wide" type="button" id="parent-pin-cancel">Отмена</button>
        </div>
      </section>
    </div>

    <div id="parent-panel" class="parent-overlay" hidden>
      <section class="parent-card parent-panel-card" role="dialog" aria-modal="true" aria-labelledby="parent-panel-title">
        <h2 id="parent-panel-title" class="parent-title">Панель родителя</h2>
        <p class="parent-subtitle">Уровень 1: быстрые функции PLANKA</p>

        <div class="parent-actions">
          <button class="parent-action-btn" type="button" data-parent-action="sync">
            Сбросить историю в бэкенд
          </button>
          <button class="parent-action-btn" type="button" data-parent-action="stats">
            Сводка использования за сегодня
          </button>
          <button class="parent-action-btn" type="button" data-parent-action="wifi">
            Проверить настройки Wi-Fi
          </button>
        </div>

        <p id="parent-panel-status" class="parent-status" aria-live="polite"></p>

        <div class="parent-actions parent-actions-footer">
          <button id="parent-system-btn" class="parent-action-btn parent-action-btn-primary" type="button">
            Системные настройки (уровень 2)
          </button>
          <button id="parent-close-btn" class="parent-action-btn" type="button">
            Вернуться в режим Андрюши
          </button>
        </div>
      </section>
    </div>

    <div id="toast" class="app-toast" role="status" aria-live="polite" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
